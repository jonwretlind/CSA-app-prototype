<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3F51B5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Life Outfitter — Continual Spiritual State App">
  <title>Life Outfitter — Sign In</title>
  <link rel="manifest" href="/manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/roboto@5/300.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/roboto@5/400.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/roboto@5/500.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/roboto@5/700.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/material-icons@1.13.12/iconfont/material-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body class="page-login">

  <div class="login-bg">
    <div class="login-container">

      <!-- App branding -->
      <div class="login-header">
        <div class="login-logo">
          <img src="/assets/lo-logo.jpg" alt="Life Outfitter" style="width:140px;height:auto;border-radius:8px;">
        </div>
        <h1 class="login-app-name">Continual Spiritual State</h1>
        <p class="login-tagline">Demo Prototype App ALPHA</p>
      </div>

      <!-- Login card -->
      <div class="card login-card">
        <h2 class="card-title">Sign In</h2>

        <div id="login-error" class="alert alert-error hidden"></div>

        <form id="login-form" novalidate>
          <div class="form-field">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              autocomplete="email"
              inputmode="email"
              placeholder="you@example.com"
              required>
          </div>

          <div class="form-field">
            <label for="password" class="form-label">Password</label>
            <div class="input-with-icon">
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                autocomplete="current-password"
                placeholder="Password"
                required>
              <button type="button" class="icon-btn input-suffix" id="toggle-password" aria-label="Toggle password visibility">
                <span class="material-icons" id="toggle-icon">visibility</span>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-full" id="login-btn">
            Sign In
          </button>
        </form>
      </div>

      <p class="login-version">CSA Prototype · v1.0</p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
