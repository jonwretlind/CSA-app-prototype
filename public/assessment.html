<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3F51B5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Assessment — Life Outfitter</title>
  <link rel="manifest" href="/manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/roboto@5/300.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/roboto@5/400.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/roboto@5/500.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/roboto@5/700.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/material-icons@1.13.12/iconfont/material-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body class="page-app page-assessment">

  <!-- Top App Bar -->
  <header class="app-bar app-bar--assessment">
    <button class="icon-btn" id="back-btn" aria-label="Go back">
      <span class="material-icons">close</span>
    </button>
    <span class="app-bar-title">Assessment</span>
    <span class="assess-progress-label" id="progress-label">1 / 7</span>
  </header>

  <!-- Step Progress Bar -->
  <div class="step-progress-bar">
    <div class="step-progress-fill" id="step-fill" style="width:14.28%"></div>
  </div>

  <!-- Main Content -->
  <main class="main-content main-content--assessment">

    <!-- Loading state -->
    <div id="loading-state" class="loading-center">
      <div class="spinner"></div>
      <p class="text-muted">Loading assessment…</p>
    </div>

    <!-- Assessment Steps Container -->
    <div id="steps-container" class="steps-container hidden">

      <!-- Steps generated by JS -->

    </div>

    <!-- Review / Submit Screen -->
    <div id="review-screen" class="review-screen hidden">
      <div class="card">
        <h3 class="card-section-title" style="text-align:center;">Review Your Responses</h3>
        <p class="text-muted text-center" style="margin-bottom:16px;">Adjust any slider before submitting.</p>
        <div id="review-list" class="review-list"></div>
      </div>

      <div class="card">
        <div class="form-field">
          <label class="form-label">Optional Notes</label>
          <textarea
            id="assessment-notes"
            class="form-input form-textarea"
            placeholder="Any thoughts about where you are today?"
            maxlength="1000"
            rows="3"></textarea>
        </div>
      </div>

      <div id="submit-error" class="alert alert-error hidden"></div>

      <button class="btn btn-primary btn-full" id="submit-btn">
        <span class="material-icons" style="vertical-align:middle;margin-right:4px;">check_circle</span>
        Submit Assessment
      </button>
    </div>

    <!-- Success Screen -->
    <div id="success-screen" class="success-screen hidden">
      <div class="card text-center">
        <span class="material-icons success-icon">check_circle</span>
        <h3>Assessment Saved!</h3>
        <p class="text-muted">Great work reflecting on your spiritual state today.</p>
        <div id="success-scores" class="success-scores"></div>
        <a href="/dashboard.html" class="btn btn-primary" style="margin-top:16px;">
          View Dashboard
        </a>
      </div>
    </div>

  </main>

  <!-- Navigation Buttons (shown during steps) -->
  <div class="assess-nav hidden" id="assess-nav">
    <button class="btn btn-outlined" id="prev-btn" disabled>
      <span class="material-icons">chevron_left</span>
      Back
    </button>
    <div class="step-dots" id="step-dots"></div>
    <button class="btn btn-primary" id="next-btn">
      Next
      <span class="material-icons">chevron_right</span>
    </button>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/assessment.js"></script>
</body>
</html>
